body:
  text: 大興善寺翻經院灌頂阿闍梨述我今為末世薄福衆生故説是北極七星供養護摩次第儀則於靜室中作一水壇或方或圓各足一肘以茅香甘松熏陸龍腦白檀五味和合泥塗之其壇場內安著圓爐飲食果子分別置之燒食謂飯食果餅酥蜜等但五穀并乳木隨人命星相撿用之先啓詞曰至心奉啓北極七明娜羅貪狼巨門祿存文曲廉貞武曲破軍尊星為陀主某甲災厄解脫壽命延長得見百秋今作曼荼羅唯願垂哀降臨此處納受護摩擁護施主某甲災難解脫壽命增長所願從心三遍次結其印虛心合掌以二大指捻二無名指甲二中指二小指如蓮葉二頭指小開屈來去次誦一字頂輪王真言并召北斗七星真言頂輪真言曰曩慕三曼多那羅那羅跛左囉吽召北斗真言曰曩莫三曼多那羅曩翳醯呬頗伊賀伊那伊迦伊囉伊謨囉二合哆囉伽囉唅娑嚩訶以手取木及穀并酥蜜油等擲之於爐內火燒之自專視其本命之星若動搖變色光照通爍光貌黃白者即應願如來依前法七日夜而為之必應如事不即其星藏沒不見決云不求也謂北斗七星者日月五星之精也曩括七曜照臨八方上曜於天神下直于人間以司善惡而分禍福群星所朝宗萬靈所俯仰若有人能禮拜供養長壽福貴不信敬者運命不久是以祿命書云世有司命神每至庚申日上向天帝陳説衆人之罪惡重罪者則徹算輕罪者則去紀算書紀告即主命已者是故如來為末世薄福短命夭死衆生故説是一字頂輪王召北斗七星供養護摩之儀則為供養者令其屬命星數削死籍還付生籍若諸國王於自宮中作曼茶羅如法護摩禮拜供養北斗歡喜為擁護故久居勝位恆受安穩后妃夫人後宮綵女王子群臣三公百官上下和穆不行非法人民熾盛稼穡豐饒國土安寧無有災難不現怪異疫病死亡不起境內怨敵群賊自然退散故以是法甚為祕要
